name: datagrip

ddev_version_constraint: ">= v1.24.10"

# ─── Files copied into the project's .ddev/ directory ─────────────────────────
# The main script and its helper library are listed explicitly so it's clear
# which files this add-on installs. The helper lives in a subdirectory under
# commands/host/ — DDEV's command scanner only treats direct children of
# commands/host/ as commands, so files in commands/host/datagrip-lib/ are
# safe from being misinterpreted as standalone ddev commands.
#
# datagrip/.gitignore is shipped as a project file rather than generated by
# the script at runtime. This means it exists immediately on install (before
# the user runs anything) and DDEV handles its lifecycle via the
# #ddev-generated marker — file is replaced on re-install if unmodified, and
# removed on `ddev add-on remove`. Users who want to customize it can remove
# the marker; DDEV will then leave it alone on subsequent updates.
project_files:
  - commands/host/datagrip
  - commands/host/datagrip-lib/version-check.sh
  - commands/host/datagrip-lib/config.sh
  - commands/host/datagrip-lib/versions.json
  - commands/host/datagrip-lib/versions/2025.2.5.sh
  - commands/host/datagrip-lib/versions/unsupported.sh
  - datagrip/.gitignore

# ─── Post-install actions ─────────────────────────────────────────────────────
# We chmod +x the script files. The helpers are sourced rather than executed,
# so their execute bits are technically unnecessary, but matching permissions
# keeps things consistent and avoids surprises if a helper is ever invoked
# directly during debugging.
post_install_actions:
  - |
    #ddev-description: Make `ddev datagrip` command and its helpers executable
    chmod +x "${DDEV_APPROOT}/.ddev/commands/host/datagrip"
    chmod +x "${DDEV_APPROOT}/.ddev/commands/host/datagrip-lib/version-check.sh"
    chmod +x "${DDEV_APPROOT}/.ddev/commands/host/datagrip-lib/config.sh"
    chmod +x "${DDEV_APPROOT}/.ddev/commands/host/datagrip-lib/versions/2025.2.5.sh"
    chmod +x "${DDEV_APPROOT}/.ddev/commands/host/datagrip-lib/versions/unsupported.sh"

# ─── Removal actions ──────────────────────────────────────────────────────────
# Order matters: remove the main command first, then the helper directory,
# then the runtime data dir, then print the goodbye message.
#
# Note: datagrip/.gitignore is NOT removed by an explicit action here because
# DDEV removes #ddev-generated project_files automatically. The runtime data
# rm -rf below catches the rest of .ddev/datagrip/ (including .gitignore if
# the user customized it past DDEV's reach).
#
# The pgpass note uses single-quoted strings to avoid backtick command-
# substitution issues that would silently drop "ddev datagrip -p" from
# the message.
removal_actions:
  - |
    #ddev-description: Remove `ddev datagrip` command
    rm -f "${DDEV_APPROOT}/.ddev/commands/host/datagrip"

  - |
    #ddev-description: Remove `ddev datagrip` helper library
    rm -rf "${DDEV_APPROOT}/.ddev/commands/host/datagrip-lib"

  - |
    #ddev-description: Remove leftover files and directories
    TARGET_DIR="${DDEV_APPROOT}/.ddev/datagrip"
    if [ -d "$TARGET_DIR" ]; then
      rm -rf "$TARGET_DIR"
    fi

  - |
    #ddev-description: Output that certain files may have been left behind
    echo 'ddev-datagrip has been removed, I hope it was useful to you!'
    echo ''
    echo 'Do note: If you had a Postgres DB and used "ddev datagrip -p" at any point in time, ~/.pgpass and ~/.pgpass.bak files may have been created or modified'
    echo 'You may want to remove the ~/.pgpass.bak file and review the ~/.pgpass file for changes, removing any references to the DDEV database if necessary'
